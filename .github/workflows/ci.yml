name: CI

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

      - name: test
        run: go test ./... -race -cover

      - name: validate tickets
        run: |
          go build -o tick ./cmd/tickets
          ./tick validate
