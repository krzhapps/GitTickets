version: "2"
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unused 
  #   - asasalint
  #   - asciicheck
  #   - bodyclose
  #   - contextcheck
  #   - durationcheck
  #   - err113
  #   - errname
  #   - errorlint
  #   - exhaustive
  #   - forcetypeassert
  #   - goconst
  #   - gocritic
  #   - godot
  #   - gomoddirectives
  #   - gosec
  #   - importas
  #   - makezero
  #   - misspell
  #   - mnd
  #   - nakedret
  #   - nestif
  #   - nilerr
  #   - nilnil
  #   - noctx
  #   - nolintlint
  #   - prealloc
  #   - predeclared
  #   - promlinter
  #   - reassign
  #   - revive
  #   - staticcheck
  #   - testableexamples
  #   - thelper
  #   - tparallel
  #   - unconvert
  #   - unparam
  #   - usestdlibvars
  #   - usetesting
  #   - wastedassign
  # disable:
  #   - cyclop
  #   - decorder
  #   - depguard
  #   - dogsled
  #   - dupl
  #   - forbidigo
  #   - funlen
  #   - gochecknoglobals
  #   - gochecknoinits
  #   - gocognit
  #   - gocyclo
  #   - godox
  #   - goheader
  #   - gomodguard
  #   - goprintffuncname
  #   - lll
  #   - nlreturn
  #   - paralleltest
  #   - rowserrcheck
  #   - sqlclosecheck
  #   - tagliatelle
  #   - testpackage
  #   - varnamelen
  #   - whitespace
  #   - wrapcheck
  #   - wsl
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
